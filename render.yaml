services:
  # ── Backend: FastAPI + Google ADK ─────────────────────────────────────────
  - type: web
    name: future-founder-twin-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: GOOGLE_API_KEY
        sync: false          # Set this manually in the Render dashboard
      - key: GOOGLE_API_KEY_2
        sync: false          # Optional: second key for rate limit rotation
      - key: GOOGLE_API_KEY_3
        sync: false          # Optional: third key for rate limit rotation
      - key: FRONTEND_URL
        sync: false          # Set this to your Vercel frontend URL after deployment
    healthCheckPath: /health
